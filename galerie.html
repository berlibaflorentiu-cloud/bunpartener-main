  <style>
    /* Language switcher */
    .lang-sw { display:flex; flex-direction:column; gap:3px; align-items:center; }
    .lang-row { display:flex; gap:4px; }
    .lang-btn { background:none; border:1px solid rgba(255,255,255,.22); border-radius:6px; color:rgba(255,255,255,.5); cursor:pointer; font-family:var(--ff-sans); font-size:11px; font-weight:600; letter-spacing:.06em; padding:5px 9px; transition:border-color .2s,color .2s,background .2s; line-height:1; }
    .lang-btn:hover { border-color:rgba(255,255,255,.45); color:var(--white); }
    .lang-btn.active { background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.38); color:var(--white); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d1b35; --navy-2: #142240; --navy-3: #1c3060;
      --white: #fff; --light: #8a9bbf; --red: #e12d39;
      --ff-serif: 'Cormorant Garamond', Georgia, serif;
      --ff-sans: 'DM Sans', system-ui, sans-serif;
      --max-w: min(1180px, 100% - 48px);
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--ff-sans); color: var(--white); background: var(--navy); line-height: 1.7; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    .wrap { width: var(--max-w); margin-inline: auto; }

    /* Top bar */
    .gal-nav { padding: 24px 0; border-bottom: 1px solid rgba(255,255,255,.08); position: sticky; top: 0; background: rgba(13,27,53,.86); backdrop-filter: blur(8px); z-index: 5; }
    .gal-nav .wrap { display: flex; align-items: center; justify-content: space-between; }
    .gal-logo img { height: 40px; width: auto; display: block; }
    .gal-back {
      display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600;
      letter-spacing: .04em; color: rgba(255,255,255,.65); transition: color .2s;
    }
    .gal-back:hover { color: var(--white); }
    .gal-back svg { width: 17px; height: 17px; }

    /* Header */
    .gal-head { padding: clamp(48px, 7vw, 88px) 0 clamp(28px, 4vw, 44px); text-align: center; }
    .gal-tag {
      display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: rgba(255,255,255,.5);
      border: 1px solid rgba(255,255,255,.18); border-radius: 999px; padding: 7px 16px; margin-bottom: 22px;
    }
    .gal-title { font-family: var(--ff-serif); font-size: clamp(40px, 6vw, 64px); font-weight: 600; line-height: 1.05; }
    .gal-title em { font-style: italic; color: rgba(255,255,255,.72); }
    .gal-sub { margin-top: 16px; font-size: 16px; color: rgba(255,255,255,.55); max-width: 560px; margin-inline: auto; }

    /* Grid */
    .gal-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px;
      padding-bottom: clamp(60px, 9vw, 120px);
    }
    .gal-item {
      border-radius: 16px; overflow: hidden; background: var(--navy-2);
      border: 1px solid rgba(255,255,255,.08); aspect-ratio: 3 / 2;
      transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease;
      will-change: transform;
    }
    .gal-item img {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      transition: transform .55s cubic-bezier(.22,.61,.36,1);
    }
    .gal-item:hover {
      transform: translateY(-5px) scale(1.015);
      box-shadow: 0 22px 48px rgba(0,0,0,.4);
      border-color: rgba(255,255,255,.2);
    }
    .gal-item:hover img { transform: scale(1.07); }
    @media (prefers-reduced-motion: reduce) {
      .gal-item, .gal-item img { transition: none; }
      .gal-item:hover { transform: none; }
      .gal-item:hover img { transform: none; }
    }

    @media (max-width: 760px) {
      .gal-grid { grid-template-columns: 1fr; gap: 20px; }
    }
    /* ── Accessibility ───────────────────────────────── */
    .skip-link{position:fixed;left:12px;top:-64px;z-index:3000;background:#fff;color:#0d1b35;padding:10px 18px;border-radius:8px;font-family:'DM Sans',system-ui,sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 6px 20px rgba(0,0,0,.25);transition:top .18s ease;}
    .skip-link:focus{top:12px;}
    :focus-visible{outline:2px solid #3b6ef6;outline-offset:2px;}
