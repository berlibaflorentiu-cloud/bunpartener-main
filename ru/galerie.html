  <style>
    /* Phase 1 — video */
    #iv-video { position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1; }

    /* Phase 2 — white screen with text */
    #iv-white { position:absolute;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .8s ease;z-index:2; }

    #iv-cursor { display:inline-block;width:2px;height:1em;background:#2c3e6b;margin-left:2px;vertical-align:middle;animation:ivc .7s step-end infinite; }
    @keyframes ivc { 50%{opacity:0} }
    /* Phase 3 — white logo screen */
    #iv-logo-screen { position:absolute;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .8s ease;z-index:3; }

    #iv-div { width:1px;height:70px;background:#c5cfe0;opacity:0;transition:opacity .5s ease;flex-shrink:0; }

<script>
(function(){
  var CHARS = (function(){
    var pre  = 'Послание для вашей правовой защиты от ';
    var stN  = '<span style="white-space:nowrap">Bu<em style="color:#c0392b;font-style:italic;font-size:1.2em;font-weight:400">N</em>';
    var post = 'Partener</span>';
    var arr  = [];
    for(var i=0;i<pre.length;i++) arr.push(pre[i]);
    arr.push(stN);
    for(var i=0;i<post.length;i++) arr.push(post[i]);
    return arr;
  })();
  var ov         = document.getElementById('intro-overlay');
  var vid        = document.getElementById('iv-video');
  var aud        = document.getElementById('iv-audio');
  var white      = document.getElementById('iv-white');
  var msg        = document.getElementById('iv-msg');
  var txt        = document.getElementById('iv-text');
  var cur        = document.getElementById('iv-cursor');
  var logoScreen = document.getElementById('iv-logo-screen');
  var icon       = document.getElementById('iv-icon');
  var divl       = document.getElementById('iv-div');
  var name       = document.getElementById('iv-name');
  var sub        = document.getElementById('iv-sub');
  var skip       = document.getElementById('iv-skip');

  var textStarted = false;

  function dismiss(){
    ov.style.opacity='0'; skip.style.display='none';
    setTimeout(function(){ ov.style.display='none'; }, 800);
  }
  skip.addEventListener('click', dismiss);

  function type(i){
    if(i<=CHARS.length){
      txt.innerHTML = CHARS.slice(0,i).join('');
      txt.appendChild(cur);
      setTimeout(function(){ type(i+1); }, 38);
    } else {
      setTimeout(function(){
        cur.style.display='none';
        setTimeout(function(){
          msg.style.opacity='0';
          setTimeout(revealLogo, 800);
        }, 700);
      }, 900);
    }
  }

  function revealLogo(){
    msg.style.display='none';
    logoScreen.style.opacity='1';
    skip.style.background='rgba(0,0,0,.07)';
    skip.style.color='#333';
    skip.style.borderColor='rgba(0,0,0,.2)';
    setTimeout(function(){ icon.classList.add('show'); }, 200);
    setTimeout(function(){ divl.classList.add('show'); }, 500);
    setTimeout(function(){ name.classList.add('show'); }, 650);
    setTimeout(function(){ sub.classList.add('show'); }, 1500);
    setTimeout(dismiss, 3400);
  }

  vid.addEventListener('timeupdate', function(){
    if(!textStarted && vid.currentTime >= 13.01){
      textStarted = true;
      white.style.opacity = '1';
      setTimeout(function(){ type(0); }, 400);
    }
  });

  vid.src = 'intro-video.mp4';
  vid.load();

  vid.addEventListener('canplay', function(){
    var p = vid.play();
    if(p && p.catch){
      p.catch(function(){
        vid.muted = true;
        vid.play();
      });
    }
    aud.play().catch(function(){});
  }, {once:true});
})();
</script>
